/* ── GITHUB API ─────────────────────────── */
// Robust UTF-8 → base64 (fixes special chars: Türkiye, Curaçao etc.)
function toB64(str){
  const bytes=new TextEncoder().encode(str);
  let bin='';
  bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}
function ghHdr(){return{'Authorization':`Bearer ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};}

async function loadData(){
  try{
    const r=await fetch(RAW+'?t='+Date.now());
    if(r.status===404)return JSON.parse(JSON.stringify(DEF));
    if(!r.ok)throw new Error('fetch');
    return await r.json();
  }catch{return JSON.parse(JSON.stringify(DEF));}
}

// Merge-safe write: fetches latest SHA, merges, then writes
async function ghWrite(patch,msg='update',retries=5){
  const tok=getToken();
  if(!tok)throw new Error('NO_TOKEN');
  for(let i=0;i<retries;i++){
    try{
      const fr=await fetch(API+`?ref=${BRANCH}`,{headers:ghHdr()});
      if(!fr.ok&&fr.status!==404)throw new Error('read_err_'+fr.status);
      let base=JSON.parse(JSON.stringify(DEF)),sha=null;
      if(fr.ok){const fi=await fr.json();sha=fi.sha;base=JSON.parse(atob(fi.content.replace(/\n/g,'')));}
      const merged=merge(base,patch);
      const body={message:msg,content:toB64(JSON.stringify(merged,null,2)),branch:BRANCH};
      if(sha)body.sha=sha;
      const wr=await fetch(API,{method:'PUT',headers:ghHdr(),body:JSON.stringify(body)});
      if(wr.status===409||wr.status===422){await sleep(700*(i+1));continue;}
      if(!wr.ok){const e=await wr.json();throw new Error(e.message||'write_err_'+wr.status);}
      return merged;
    }catch(e){if(i===retries-1)throw e;await sleep(600*(i+1));}
  }
  throw new Error('max_retries');
}

function merge(base,patch){
  const settings=patch.settings!==undefined?patch.settings:base.settings;
  const bp=base.participants||[];
  const pp=patch.participants||[];
  const merged=[...bp];
  pp.forEach(p=>{const i=merged.findIndex(x=>x.id===p.id);if(i>=0)merged[i]=p;else merged.push(p);});
  return{settings,participants:merged};
}

// Delete a participant
async function ghDeleteParticipant(id){
  const nd=await ghWrite({participants:[]},'Admin: delete '+id);
  // actually remove from list
  const fr=await fetch(API+`?ref=${BRANCH}`,{headers:ghHdr()});
  const fi=await fr.json();
  const data=JSON.parse(atob(fi.content.replace(/\n/g,'')));
  data.participants=data.participants.filter(p=>p.id!==id);
  const body={message:'Admin: delete participant '+id,content:toB64(JSON.stringify(data,null,2)),branch:BRANCH,sha:fi.sha};
  const wr=await fetch(API,{method:'PUT',headers:ghHdr(),body:JSON.stringify(body)});
  if(!wr.ok)throw new Error('delete failed');
  return data;
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s+'_wc2026_salt'));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ── SCORING ────────────────────────────── */
function calcScore(p,settings){
  if(!settings)return{total:0,d:{}};
  const res=settings.results||{};
  let total=0,d={g:0,ch:0,r32:0,r16:0,qf:0,sf:0,final:0,ex:0,kow:0};
  if(res.groups)GROUPS.forEach(g=>{
    const act=res.groups[g.id],pick=p.groupPicks?.[g.id];
    if(!act?.first||!pick?.length)return;
    const t2=[act.first,act.second];let gp=0;
    if(t2.includes(pick[0])){gp+=2;if(pick[0]===act.first)gp+=1;}
    if(pick[1]&&t2.includes(pick[1])){gp+=2;if(pick[1]===act.second)gp+=1;}
    total+=gp;d.g+=gp;
  });
  if(res.champion&&p.championPick===res.champion){total+=5;d.ch=5;}
  RNDS.forEach(rn=>{
    const ms=res[rn]||[],pks=p.knockoutPicks?.[rn]||{},cfg=RC[rn];let rp=0;
    ms.forEach(m=>{
      if(!m.result?.winner)return;
      const pk=pks[m.id];if(!pk)return;
      if(!cfg.hasScore){if(pk===m.result.winner){rp+=cfg.pts;d.kow++;}}
      else if(pk?.winner===m.result.winner){rp+=cfg.pts;d.kow++;if(Number(pk.h)===m.result.h&&Number(pk.a)===m.result.a){rp+=cfg.ep;d.ex++;}}
    });
    total+=rp;d[rn]=rp;
  });
  return{total,d};
}

/* ── LOGIN ───────────────────────────────── */
function LoginScreen({S,P,onLogin,onData}){
  const [un,setUn]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [mode,setMode]=useState('login');
  const approved=(S.approvedUsernames||[]).map(x=>x.toLowerCase());

  const doLogin=async()=>{
    const u=un.toLowerCase().trim();
    if(!u||!pw){setErr('Enter username and password.');return;}
    if(!approved.includes(u)){setErr('Username not found. Contact the organiser.');return;}
    const ex=P.find(p=>p.username===u);
    if(!ex?.passwordHash){setMode('register');return;}
    setBusy(true);
    const h=await sha256(pw);
    if(h!==ex.passwordHash){setErr('Wrong password.');setBusy(false);return;}
    onLogin({username:u,id:ex.id});
    setBusy(false);
  };

  const doRegister=async()=>{
    const u=un.toLowerCase().trim();
    if(!approved.includes(u)){setErr('Username not approved.');return;}
    if(pw.length<6){setErr('Password must be at least 6 characters.');return;}
    if(pw!==pw2){setErr('Passwords do not match.');return;}
    setBusy(true);
    try{
      const h=await sha256(pw);
      const np={id:u+'_'+Date.now(),username:u,passwordHash:h,groupPicks:{},championPick:'',knockoutPicks:{},disclaimer:null,paymentConfirmed:false,createdAt:Date.now(),updatedAt:Date.now()};
      const nd=await ghWrite({participants:[np]},'Register: '+u);
      onData(nd);onLogin({username:u,id:np.id});
    }catch(e){setErr(e.message==='NO_TOKEN'?'App not configured — contact organiser.':'Registration failed. Try again.');}
    setBusy(false);
  };

  if(mode==='register')return(
    <div className="max-w-xs mx-auto pt-8">
      <div className="text-center mb-6"><div className="text-4xl mb-2">🔑</div>
        <h2 className="text-xl font-black">Create Password</h2>
        <p className="text-slate-400 text-sm mt-1">Welcome <strong className="text-white">{un}</strong> — first time? Set a password.</p>
      </div>
      <div className="space-y-3">
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Choose password (min 6 chars)"
          className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-500"/>
        <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Confirm password"
          onKeyDown={e=>e.key==='Enter'&&doRegister()}
          className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-500"/>
        {err&&<p className="text-red-400 text-xs">{err}</p>}
        <button onClick={doRegister} disabled={busy} className="w-full bg-green-700 hover:bg-green-600 disabled:opacity-50 text-white py-3 rounded-xl font-black">{busy?'Creating…':'Create Account →'}</button>
        <button onClick={()=>{setMode('login');setErr('');}} className="w-full text-slate-400 hover:text-white text-sm py-1">← Back</button>
      </div>
    </div>
  );

  return(
    <div className="max-w-xs mx-auto pt-8">
      <div className="text-center mb-6"><div className="text-5xl mb-2">⚽</div>
        <h2 className="text-2xl font-black">Sign In</h2>
        <p className="text-slate-400 text-sm mt-1">Use the username given by the organiser</p>
      </div>
      <div className="space-y-3">
        <input type="text" value={un} onChange={e=>setUn(e.target.value)} placeholder="Username"
          className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-500"/>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password"
          onKeyDown={e=>e.key==='Enter'&&doLogin()}
          className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-500"/>
        {err&&<p className="text-red-400 text-xs">{err}</p>}
        <button onClick={doLogin} disabled={busy} className="w-full bg-green-700 hover:bg-green-600 disabled:opacity-50 text-white py-3 rounded-xl font-black">{busy?'Signing in…':'Sign In →'}</button>
      </div>
      <p className="text-xs text-slate-600 text-center mt-4">No username? Contact the organiser.</p>
    </div>
  );
}

/* ── PICKS FLOW ──────────────────────────── */
function PicksFlow({user,P,S,locked,onData}){
  const p=P.find(x=>x.username===user.username)||{};
  const [gPicks,setGPicks]=useState(()=>JSON.parse(JSON.stringify(p.groupPicks||{})));
  const [champ,setChamp]=useState(p.championPick||'');
  const [koPicks,setKoPicks]=useState(()=>JSON.parse(JSON.stringify(p.knockoutPicks||{})));
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [showDisc,setShowDisc]=useState(false);
  const signed=!!p.disclaimer?.signed;

  const toggleG=(gid,team)=>{
    if(locked)return;
    setGPicks(prev=>{
      const c=[...(prev[gid]||[])];const i=c.indexOf(team);
      if(i!==-1)c.splice(i,1);else if(c.length<2)c.push(team);else c[1]=team;
      return{...prev,[gid]:c};
    });
  };
  const setKo=(rnd,mid,val)=>setKoPicks(prev=>({...prev,[rnd]:{...(prev[rnd]||{}),[mid]:val}}));

  const attempt=()=>{
    const done=GROUPS.every(g=>(gPicks[g.id]?.length||0)>=2);
    if(!locked&&!done){setErr('⚠️ Pick top 2 for all 12 groups first!');return;}
    if(!locked&&!champ){setErr('⚠️ Pick your champion!');return;}
    setErr('');
    if(!signed){setShowDisc(true);return;}
    doSave(p.disclaimer);
  };

  const doSave=async(disclaimer)=>{
    setBusy(true);setErr('');setOk('');
    try{
      const entry={...p,id:p.id||(user.username+'_'+Date.now()),username:user.username,
        groupPicks:locked?(p.groupPicks||gPicks):gPicks,
        championPick:locked?(p.championPick||champ):champ,
        knockoutPicks:koPicks,disclaimer,updatedAt:Date.now()};
      const nd=await ghWrite({participants:[entry]},'Picks: '+user.username);
      onData(nd);setShowDisc(false);setOk('✅ Picks saved!');
      setTimeout(()=>setOk(''),3000);
    }catch(e){
      if(e.message==='NO_TOKEN')setErr('❌ App not configured. Contact organiser.');
      else setErr('❌ Save failed: '+e.message);
    }
    setBusy(false);
  };

  if(showDisc)return<DisclaimerPage onSign={doSave} onBack={()=>setShowDisc(false)} busy={busy}/>;

  const doneCount=GROUPS.filter(g=>(gPicks[g.id]?.length||0)>=2).length;
  // R32 always shown if matches exist; other rounds need admin to open them
  const visibleRounds=RNDS.filter(rn=>{
    const ms=S.results?.[rn]||[];
    if(!ms.length)return false;
    if(rn==='r32')return true; // R32 always open once matches are added
    return(S.openRounds||[]).includes(rn);
  });

  return(
    <div>
      {signed&&<div className="bg-green-900/30 border border-green-700/40 rounded-xl p-2 mb-3 text-xs text-green-300 text-center">
        ✅ Disclaimer signed · {new Date(p.disclaimer.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>}
      <div className="flex items-center justify-between mb-2">
        <div><h2 className="font-black text-lg">Hi {user.username}! 👋</h2>
          <p className="text-xs text-slate-400">{locked?'🔒 Group picks locked':`${doneCount}/12 groups · locks Jun 4`}</p></div>
        <div className={`text-sm font-black px-3 py-1 rounded-full ${doneCount===12?'bg-green-800 text-green-300':'bg-slate-700 text-slate-400'}`}>{doneCount}/12</div>
      </div>
      <div className="h-1.5 bg-slate-700 rounded-full mb-4"><div className="h-1.5 bg-green-500 rounded-full transition-all" style={{width:`${(doneCount/12)*100}%`}}/></div>

      {/* Champion */}
      <div className="bg-slate-800 border border-yellow-800/60 rounded-xl p-3 mb-4">
        <h3 className="font-bold text-yellow-400 text-sm mb-2">🏆 Champion Pick <span className="text-yellow-600 font-normal text-xs">+5 bonus pts</span></h3>
        {locked?<p className="text-sm">{champ?`${FL[champ]||''} ${champ}`:<span className="text-slate-500">Not picked</span>}</p>:(
          <select value={champ} onChange={e=>setChamp(e.target.value)}
            className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-yellow-500">
            <option value="">— Pick your champion —</option>
            {GROUPS.map(g=><optgroup key={g.id} label={`Group ${g.id}`}>{g.teams.map(t=><option key={t} value={t}>{FL[t]||''} {t}</option>)}</optgroup>)}
          </select>
        )}
        {champ&&!locked&&<p className="text-yellow-300 text-xs mt-1">{FL[champ]} {champ} ✓</p>}
      </div>

        <div className="text-center py-12"><div className="text-5xl mb-3">🌍</div>

          <p className="text-slate-500 text-sm mt-1">Players appear once they've signed the disclaimer.</p></div>
      ):(
        <div className="space-y-1.5">
          {ranked.map((p,i)=>(
            <div key={p.id} className="overflow-hidden rounded-xl border">
              <div onClick={()=>setExp(exp===p.id?null:p.id)}
                className={`flex items-center gap-3 p-3 cursor-pointer hover:brightness-110 ${rowBg(i)}`}>
                <span className="text-xl w-8 text-center shrink-0 font-bold">{medal(i)}</span>

                <div className="text-right shrink-0"><div className="text-2xl font-black text-green-400">{p.sc.total}</div><div className="text-xs text-slate-500">pts</div></div>
                <span className="text-slate-600 text-xs">{exp===p.id?'▲':'▼'}</span>

/* ── ADMIN: USERS ────────────────────────── */
function AUsers({S,onSave}){
  const [newU,setNewU]=useState('');
  const approved=S.approvedUsernames||[];
  const add=()=>{
    const u=newU.toLowerCase().trim();
    if(!u||approved.includes(u)){setNewU('');return;}
    if(approved.length>=100){alert('Max 100 reached.');return;}
    onSave({...S,approvedUsernames:[...approved,u]});setNewU('');
  };
  const remove=u=>window.confirm(`Remove "${u}"?`)&&onSave({...S,approvedUsernames:approved.filter(x=>x!==u)});
  const bulk=txt=>{
    const ns=txt.split(/[\n,;]+/).map(s=>s.trim().toLowerCase()).filter(Boolean);
    onSave({...S,approvedUsernames:[...new Set([...approved,...ns])].slice(0,100)});
  };
  return(
    <div>
      <p className="text-xs text-slate-400 mb-3">Add usernames. Only approved usernames can register. Max 100.</p>
      <div className="flex gap-1 mb-3">
        <input value={newU} onChange={e=>setNewU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="e.g. alice, player01"
          className="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-green-500"/>
        <button onClick={add} disabled={!newU.trim()} className="bg-green-700 hover:bg-green-600 disabled:opacity-40 text-white px-4 py-2 rounded-xl font-bold text-sm">Add</button>
      </div>
      <details className="mb-3">
        <summary className="text-xs text-slate-400 cursor-pointer hover:text-white">📋 Bulk add (comma / newline separated)</summary>

              <div className="font-black text-green-400 text-sm mb-2">Group {g.id}</div>

/* ── ADMIN: KNOCKOUT ─────────────────────── */
function AKnockout({S,onSave}){
  const [rnd,setRnd]=useState('r16'); // default to R16 since R32 is auto-open
  const [home,setHome]=useState('');const [away,setAway]=useState('');
  const [edits,setEdits]=useState({});const [busy,setBusy]=useState(false);
  const openRounds=S.openRounds||[];
  const matches=S.results?.[rnd]||[];const cfg=RC[rnd];
  const allT=['TBD',...ALL_TEAMS];

  const addMatch=()=>{
    if(!home||!away||home===away)return;
    const mid=`${rnd}_${Date.now()}`;
    onSave({...S,results:{...S.results,[rnd]:[...matches,{id:mid,home,away,result:null}]}});
    setHome('');setAway('');
  };
  const removeMatch=mid=>onSave({...S,results:{...S.results,[rnd]:matches.filter(m=>m.id!==mid)}});
  const getE=m=>edits[m.id]||(m.result?{winner:m.result.winner,h:m.result.h,a:m.result.a}:{});
  const setE=(mid,f,v)=>setEdits(p=>({...p,[mid]:{...getE({id:mid,result:matches.find(m=>m.id===mid)?.result}),[f]:v}}));
  const saveResults=async()=>{
    setBusy(true);
    const upd=matches.map(m=>{const e=edits[m.id];if(!e?.winner)return m;return{...m,result:{winner:e.winner,h:Number(e.h??0),a:Number(e.a??0)}};});
    await onSave({...S,results:{...S.results,[rnd]:upd}});
    setEdits({});setBusy(false);
  };
  // R32 is always open — no toggle needed. Show toggle only for R16+
  const toggleOpen=()=>onSave({...S,openRounds:openRounds.includes(rnd)?openRounds.filter(r=>r!==rnd):[...openRounds,rnd]});

  return(
    <div>
      <div className="bg-blue-900/30 border border-blue-700/40 rounded-xl p-2.5 mb-3 text-xs text-blue-300">
        📌 <strong>R32</strong> is always open for player picks once you add matches. <strong>R16 onwards</strong> — you control when players can pick.
      </div>
      <div className="flex gap-1 mb-3 flex-wrap">
        {RNDS.map(r=><button key={r} onClick={()=>setRnd(r)}
          className={`px-2.5 py-1 rounded-lg text-xs font-bold transition-all ${rnd===r?'bg-green-700 text-white':'bg-slate-700 text-slate-400 hover:text-white'}`}>
          {RC[r].name}{r==='r32'?'🔓 auto':(openRounds.includes(r)?' 🔓':' 🔒')}</button>)}
      </div>
      {rnd!=='r32'&&(
        <button onClick={toggleOpen}
          className={`w-full mb-3 py-2 rounded-xl text-xs font-bold ${openRounds.includes(rnd)?'bg-red-800 hover:bg-red-700 text-red-200':'bg-yellow-800 hover:bg-yellow-700 text-yellow-200'}`}>
          {openRounds.includes(rnd)?`🔒 Close ${cfg.name} for picks`:`🔓 Open ${cfg.name} for player picks`}
        </button>
      )}
      <div className="bg-slate-800 rounded-xl p-3 border border-slate-700 mb-3">
        <p className="text-xs text-slate-400 font-bold mb-2">Add Match to {cfg.name}</p>
        <div className="flex gap-1 items-center">
          <select value={home} onChange={e=>setHome(e.target.value)} className="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-2 py-1.5 text-xs text-white focus:outline-none min-w-0">
            <option value="">Home</option>{allT.map(t=><option key={t} value={t}>{FL[t]||''} {t}</option>)}
          </select>
          <span className="text-slate-500 text-xs font-bold shrink-0">vs</span>
          <select value={away} onChange={e=>setAway(e.target.value)} className="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-2 py-1.5 text-xs text-white focus:outline-none min-w-0">
            <option value="">Away</option>{allT.map(t=><option key={t} value={t}>{FL[t]||''} {t}</option>)}
          </select>
          <button onClick={addMatch} disabled={!home||!away||home===away} className="bg-green-700 hover:bg-green-600 disabled:opacity-40 text-white px-3 py-1.5 rounded-lg font-black shrink-0">+</button>
        </div>
      </div>
      {!matches.length&&<p className="text-slate-500 text-sm text-center py-4">No matches added for {cfg.name} yet.</p>}
      <div className="space-y-2 mb-2">
        {matches.map(m=>{
          const e=getE(m);
          return(
            <div key={m.id} className="bg-slate-800 rounded-xl p-3 border border-slate-700">
              <div className="flex justify-between items-center mb-2">
                <span className="text-sm font-semibold">{FL[m.home]||'❓'} {m.home} <span className="text-slate-400 text-xs">vs</span> {FL[m.away]||'❓'} {m.away}</span>
                <button onClick={()=>removeMatch(m.id)} className="text-red-500 hover:text-red-400 text-xs ml-2 shrink-0">✕ Remove</button>
              </div>
              <div className="flex gap-1 flex-wrap items-center">
                <select value={e.winner||''} onChange={ev=>setE(m.id,'winner',ev.target.value)}
                  className="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-2 py-1 text-xs text-white focus:outline-none min-w-[100px]">
                  <option value="">Winner?</option>
                  <option value={m.home}>{FL[m.home]||''} {m.home}</option>
                  <option value={m.away}>{FL[m.away]||''} {m.away}</option>
                </select>
                {cfg.hasScore&&<>
                  <input type="number" min="0" max="20" placeholder="H" value={e.h??''} onChange={ev=>setE(m.id,'h',ev.target.value)} className="w-10 text-center bg-slate-700 border border-slate-600 rounded-lg py-1 text-xs focus:outline-none"/>
                  <span className="text-slate-500 font-bold">–</span>
                  <input type="number" min="0" max="20" placeholder="A" value={e.a??''} onChange={ev=>setE(m.id,'a',ev.target.value)} className="w-10 text-center bg-slate-700 border border-slate-600 rounded-lg py-1 text-xs focus:outline-none"/>
                </>}
                {m.result?.winner&&!edits[m.id]&&<span className="text-xs text-green-400 font-semibold">✅ {FL[m.result.winner]} {m.result.winner}{cfg.hasScore?` (${m.result.h}–${m.result.a})`:''}</span>}
              </div>
            </div>
          );
        })}
      </div>
      {Object.keys(edits).length>0&&(
        <button onClick={saveResults} disabled={busy} className="w-full bg-green-700 hover:bg-green-600 disabled:opacity-50 text-white py-2.5 rounded-xl font-black text-sm">
          {busy?'⏳ Saving…':'💾 Save Results'}</button>
      )}
    </div>
  );
}

/* ── ADMIN: PLAYERS ──────────────────────── */
function APlayers({P,S,onData,showFlash}){
  const [editTarget,setEditTarget]=useState(null);
  const ranked=[...P].map(p=>({...p,sc:calcScore(p,S)})).sort((a,b)=>b.sc.total-a.sc.total);
  const locked=new Date()>=LOCK;

  const togglePay=async p=>{
    try{const nd=await ghWrite({participants:[{...p,paymentConfirmed:!p.paymentConfirmed}]},'Admin: payment '+p.username);onData(nd);showFlash('✅ Saved!');}
    catch(e){showFlash('❌ '+e.message,false);}
  };
  const deleteP=async p=>{
    if(!window.confirm(`Delete ${p.username}? This cannot be undone.`))return;
    try{const nd=await ghDeleteParticipant(p.id);onData(nd);showFlash('✅ Deleted '+p.username);}
    catch(e){showFlash('❌ Delete failed: '+e.message,false);}
  };
  const exportCSV=()=>{
    const rows=['Username,Points,Groups Done,Champion,Signed By,Signed Date,Payment,Last Updated',
      ...ranked.map(p=>`${p.username},${p.sc.total},${GROUPS.filter(g=>(p.groupPicks?.[g.id]?.length||0)>=2).length},${p.championPick||''},${p.disclaimer?.fullName||''},${p.disclaimer?.timestamp?new Date(p.disclaimer.timestamp).toLocaleDateString():''},${p.paymentConfirmed?'Paid':'Unpaid'},${new Date(p.updatedAt||0).toLocaleDateString()}`)
    ].join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows);a.download='wc2026.csv';a.click();
  };

  if(editTarget)return<AEditPlayer p={editTarget} S={S} onData={nd=>{onData(nd);setEditTarget(null);}} onBack={()=>setEditTarget(null)} showFlash={showFlash}/>;

  return(
    <div>
      <div className="flex justify-between items-center mb-3">
        <h3 className="font-bold">{P.length}/100 Participants</h3>
        <button onClick={exportCSV} className="text-xs bg-slate-700 hover:bg-slate-600 text-white px-2 py-1 rounded-lg">⬇️ CSV</button>
      </div>
      <div className="space-y-2">
        {ranked.map(p=>{
          const done=GROUPS.filter(g=>(p.groupPicks?.[g.id]?.length||0)>=2).length;
          return(
            <div key={p.id} className="bg-slate-800 rounded-xl p-3 border border-slate-700">
              <div className="flex items-start gap-2">
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-sm">{p.username}</div>
                  <div className="text-xs text-slate-400">{done}/12 grps · 🏆 {p.championPick?`${FL[p.championPick]||''} ${p.championPick}`:'?'}</div>
                  {p.disclaimer?.signed&&<div className="text-xs text-slate-500">✍️ {p.disclaimer.fullName}</div>}
                </div>
                <div className="text-center shrink-0"><div className="text-xl font-black text-green-400">{p.sc.total}</div><div className="text-xs text-slate-500">pts</div></div>
                <div className="flex flex-col gap-1 shrink-0">
                  <span className={`text-xs px-1.5 py-0.5 rounded text-center ${p.disclaimer?.signed?'bg-green-900/60 text-green-300':'bg-slate-700 text-slate-500'}`}>{p.disclaimer?.signed?'✅Signed':'⏳Sign'}</span>
                  <button onClick={()=>togglePay(p)} className={`text-xs px-1.5 py-0.5 rounded text-center ${p.paymentConfirmed?'bg-blue-900/60 text-blue-300':'bg-red-900/40 text-red-400'}`}>{p.paymentConfirmed?'💳Paid':'💳Unpaid'}</button>
                </div>
              </div>
              {/* Admin action buttons */}
              <div className="flex gap-1 mt-2 pt-2 border-t border-slate-700/50">
                <button onClick={()=>setEditTarget(p)}
                  className="flex-1 text-xs bg-blue-900/40 hover:bg-blue-800/60 text-blue-300 py-1 rounded-lg font-semibold">✏️ Edit Picks</button>
                <button onClick={()=>deleteP(p)}
                  className="flex-1 text-xs bg-red-900/40 hover:bg-red-800/60 text-red-400 py-1 rounded-lg font-semibold">🗑️ Delete</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── ADMIN: EDIT PLAYER ──────────────────── */
function AEditPlayer({p,S,onData,onBack,showFlash}){
  const [gPicks,setGPicks]=useState(JSON.parse(JSON.stringify(p.groupPicks||{})));
  const [champ,setChamp]=useState(p.championPick||'');
  const [koPicks,setKoPicks]=useState(JSON.parse(JSON.stringify(p.knockoutPicks||{})));
  const [busy,setBusy]=useState(false);
  const locked=new Date()>=LOCK;

  const toggleG=(gid,team)=>{
    setGPicks(prev=>{
      const c=[...(prev[gid]||[])];const i=c.indexOf(team);
      if(i!==-1)c.splice(i,1);else if(c.length<2)c.push(team);else c[1]=team;
      return{...prev,[gid]:c};
    });
  };
  const setKo=(rnd,mid,val)=>setKoPicks(prev=>({...prev,[rnd]:{...(prev[rnd]||{}),[mid]:val}}));

  const save=async()=>{
    setBusy(true);
    try{
      const updated={...p,groupPicks:gPicks,championPick:champ,knockoutPicks:koPicks,updatedAt:Date.now()};
      const nd=await ghWrite({participants:[updated]},'Admin edit: '+p.username);
      onData(nd);showFlash('✅ '+p.username+' picks updated!');
    }catch(e){showFlash('❌ '+e.message,false);}
    setBusy(false);
  };

  const clearDisc=async()=>{
    if(!window.confirm('Clear disclaimer signature for '+p.username+'? They will need to re-sign.'))return;
    setBusy(true);
    try{
      const nd=await ghWrite({participants:[{...p,disclaimer:null,updatedAt:Date.now()}]},'Admin: clear disclaimer '+p.username);
      onData(nd);showFlash('✅ Disclaimer cleared');onBack();
    }catch(e){showFlash('❌ '+e.message,false);}
    setBusy(false);
  };

  return(
    <div>
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm">← Back</button>
        <h3 className="font-black text-lg">Editing: {p.username}</h3>
      </div>

      {/* Champion */}
      <div className="bg-slate-800 border border-yellow-800/60 rounded-xl p-3 mb-3">
        <label className="text-yellow-400 font-bold text-sm block mb-2">🏆 Champion Pick</label>
        <select value={champ} onChange={e=>setChamp(e.target.value)}
          className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none">
          <option value="">— None —</option>
          {GROUPS.map(g=><optgroup key={g.id} label={`Group ${g.id}`}>{g.teams.map(t=><option key={t} value={t}>{FL[t]||''} {t}</option>)}</optgroup>)}
        </select>
      </div>

      {/* Groups */}
      <h3 className="font-bold text-green-400 mb-2 text-sm">Group Picks {locked?'(⚠️ locked — admin override)':''}</h3>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-3">
        {GROUPS.map(g=>{
          const picks=gPicks[g.id]||[];const[p1,p2]=picks;
          return(
            <div key={g.id} className="bg-slate-800 rounded-xl p-3 border border-slate-700">
              <div className="flex items-center justify-between mb-2">
                <span className="font-black text-green-400 text-xs">Group {g.id}</span>
                <div className="flex gap-1 text-xs">
                  {p1?<span className="bg-yellow-800/70 text-yellow-200 px-1 py-0.5 rounded">{FL[p1]||''} {p1.slice(0,6)}</span>:<span className="text-slate-600">1st?</span>}
                  {p2?<span className="bg-slate-600/80 text-slate-200 px-1 py-0.5 rounded">{FL[p2]||''} {p2.slice(0,6)}</span>:<span className="text-slate-600">2nd?</span>}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-1">
                {g.teams.map(team=>{
                  const idx=picks.indexOf(team);const is1=idx===0;const is2=idx===1;
                  return(
                    <button key={team} onClick={()=>toggleG(g.id,team)}
                      className={`flex items-center gap-1 py-1 px-1.5 rounded-lg text-xs font-semibold transition-all ${is1?'bg-yellow-700 text-white':is2?'bg-slate-600 text-white':'bg-slate-700 text-slate-200 hover:bg-slate-600'}`}>
                      <span>{FL[team]||'🏳️'}</span><span className="truncate">{team}</span>
                      {is1&&<span className="ml-auto">🥇</span>}{is2&&<span className="ml-auto">🥈</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* KO picks (if any rounds have matches) */}
      {RNDS.filter(rn=>(S.results?.[rn]||[]).length>0).map(rnd=>{
        const ms=S.results[rnd];const cfg=RC[rnd];const rp=koPicks[rnd]||{};
        return(
          <div key={rnd} className="mb-3">
            <h3 className="font-bold text-green-400 text-sm mb-2">{cfg.name}</h3>
            {ms.map(m=>{
              const pk=rp[m.id];const home=m.home||'TBD',away=m.away||'TBD';
              return(
                <div key={m.id} className="bg-slate-800 rounded-xl p-3 border border-slate-700 mb-2">
                  <p className="text-xs text-slate-400 mb-2">{FL[home]||''} {home} vs {FL[away]||''} {away}</p>
                  <div className="flex gap-2">
                    {[home,away].map((team,ti)=>{
                      const picked=cfg.hasScore?pk?.winner===team:pk===team;
                      return(
                        <button key={ti} onClick={()=>{if(cfg.hasScore)setKo(rnd,m.id,{...(pk||{}),winner:team});else setKo(rnd,m.id,team);}}
                          className={`flex-1 py-1.5 rounded-lg text-xs font-bold ${picked?'bg-green-700 text-white ring-2 ring-green-400':'bg-slate-700 text-slate-200 hover:bg-slate-600'}`}>
                          {FL[team]||'❓'} {team}
                        </button>
                      );
                    })}
                  </div>
                  {cfg.hasScore&&pk?.winner&&(
                    <div className="mt-2 flex items-center gap-2 justify-center text-xs">
                      <input type="number" min="0" max="20" value={pk.h??''} onChange={e=>setKo(rnd,m.id,{...pk,h:+e.target.value})} className="w-10 text-center bg-slate-700 border border-slate-600 rounded py-1 focus:outline-none"/>
                      <span>–</span>
                      <input type="number" min="0" max="20" value={pk.a??''} onChange={e=>setKo(rnd,m.id,{...pk,a:+e.target.value})} className="w-10 text-center bg-slate-700 border border-slate-600 rounded py-1 focus:outline-none"/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

      <div className="flex gap-2">
        <button onClick={clearDisc} disabled={busy||!p.disclaimer?.signed}
          className="flex-1 bg-amber-800/50 hover:bg-amber-700/60 disabled:opacity-40 text-amber-300 py-2.5 rounded-xl text-sm font-bold">
          ✍️ Clear Signature</button>
        <button onClick={save} disabled={busy}
          className="flex-[2] bg-green-700 hover:bg-green-600 disabled:opacity-50 text-white py-2.5 rounded-xl font-black text-sm">
          {busy?'⏳ Saving…':'💾 Save Changes'}</button>
      </div>
    </div>
  );
}

      </div>
      <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <h3 className="font-bold text-sm mb-2">🏆 Set Tournament Champion</h3>
        <select value={champ} onChange={e=>setChamp(e.target.value)} className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none mb-2">
          <option value="">— After the Final —</option>
          {ALL_TEAMS.map(t=><option key={t} value={t}>{FL[t]||''} {t}</option>)}
        </select>
        <button onClick={saveChamp} disabled={busy} className="w-full bg-green-700 hover:bg-green-600 disabled:opacity-50 text-white py-2 rounded-lg text-sm font-bold">{busy?'Saving…':'Save Champion'}</button>
      </div>
      <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <h3 className="font-bold text-sm mb-2">🔑 Change Admin Password</h3>
        <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="New admin password"
          className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none mb-2"/>
        <button onClick={savePw} disabled={!newPw||busy} className="w-full bg-blue-700 hover:bg-blue-600 disabled:opacity-40 text-white py-2 rounded-lg text-sm font-bold">{busy?'Saving…':'Update Password'}</button>
      </div>
      <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <h3 className="font-bold text-sm mb-2">🔒 GitHub Token (this browser)</h3>
        <div className={`text-xs mb-2 px-2 py-1.5 rounded ${tokSaved?'bg-green-900/40 text-green-300':'bg-amber-900/40 text-amber-300'}`}>
          {tokSaved?'✅ Token set on this browser — writes enabled.':'⚠️ Using embedded token. Override here if needed.'}</div>
        <input type="password" value={tok} onChange={e=>setTok(e.target.value)} placeholder="Paste new GitHub token to override"
          className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none mb-2"/>
        <div className="flex gap-1">
          <button onClick={saveTok} disabled={!tok.trim()} className="flex-1 bg-slate-600 hover:bg-slate-500 disabled:opacity-40 text-white py-1.5 rounded-lg text-xs font-bold">Save Token</button>
          {tokSaved&&<button onClick={()=>{localStorage.removeItem('wc26_gh_token');setTokSaved(false);}} className="text-xs text-red-400 hover:text-red-300 px-2">Clear</button>}
        </div>
      </div>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
